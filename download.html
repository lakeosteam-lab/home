<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LakeOS - Download</title>
    <link rel="stylesheet" href="style.css">   
    <link rel="icon" href="assets/transparent-lakeos-logo.png">
    <script src="script.js"></script>
</head>
<body>
        <div id="announcement-wrapper" class="notification-bar" style="border:none; height:43px; width:100%; display:flex; align-items:center; justify-content:center; padding:0 0; overflow:hidden;"></div>
        <script>
        (function loadAnnouncement(){
            const wrapper = document.getElementById('announcement-wrapper');
            if(!wrapper) return;
            const url = 'announcement.html?_=' + Date.now();
            fetch(url).then(r=>r.text()).then(html=>{
                const doc = new DOMParser().parseFromString(html,'text/html');
                let cfg = {display:1, omit:[]};
                const meta = doc.querySelector('meta[name="announce-config"]');
                if (meta && meta.content) {
                    try { cfg = JSON.parse(meta.content); } catch(e) {}
                } else {
                    const cfgScript = doc.getElementById('announce-config');
                    if (cfgScript) {
                        try { cfg = JSON.parse(cfgScript.textContent); } catch(e) {}
                    }
                }
                const page = (location.pathname.split('/').pop() || 'index.html');
                const omit = Array.isArray(cfg.omit) ? cfg.omit : [];
                if (String(cfg.display) === '0' || omit.indexOf(page) !== -1) {
                    wrapper.innerHTML = '';
                    wrapper.style.display = 'none';
                    return;
                }
                wrapper.style.display = 'flex';
                wrapper.innerHTML = '<iframe src="announcement.html?_=' + Date.now() + '" style="border:none; height:43px; width:100%;"></iframe>';
            }).catch(()=>{wrapper.innerHTML=''; wrapper.style.display='none';});
            setTimeout(loadAnnouncement,5000);
        })();
        </script>
    <header class="lakeos-header">
    <a href="index.html" class="logo-link">
        <img src="assets/transparent-lakeos-logo.png" alt="LakeOS Logo" class="logo">
        <span class="logo-text">LakeOS</span>
    </a>
    <div class="menu-toggle" onclick="toggleMenu()">☰</div>
    <nav class="header-nav">
        <a href="download.html">Download</a>
        <a href="privacy.html">Privacy</a>
        <a href="terms.html">Terms</a>
        <a href="credits.html">Credits</a>
    </nav>
    </header>
    <main class="download-page">
        <section class="hero">
            <h1 id="title" class="default">Download LakeOS</h1>
            <p class="default subtitle">Download our latest beta release!</p>
            <button class="download-button" onclick="goto('beta.html')" id="absolutely-nothing">Download Beta</button>
        </section>

        <section class="details">
            <p class="default">Beta Builds can be found <a href="beta.html">here</a>.</p>
            <p class="quiet">lol you came here to find nothing again</p>
        </section>
    </main>
</body>
</html>
